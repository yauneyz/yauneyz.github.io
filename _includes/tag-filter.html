{% assign all_tags = site.essays | map: 'tags' | join: ',' | split: ',' | uniq | sort %}

<div class="filter-bar" data-reveal>
  <div class="filter-chips">
    <span class="filter-label">Filter</span>
    <button class="tag-button" data-tag="all" type="button">All</button>
    {% for tag in all_tags %}
      {% unless tag == empty %}
        <button class="tag-button" data-tag="{{ tag | strip }}" type="button">
          {{ tag | strip }}
        </button>
      {% endunless %}
    {% endfor %}
  </div>
  <span class="essay-count" aria-live="polite"></span>
</div>
