<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#06070D">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

  {% seo %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/dark-theme.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% feed_meta %}
</head>
<body class="dark-theme">

  <div class="aurora-bg" aria-hidden="true">
    <div class="blob violet"></div>
    <div class="blob cyan"></div>
    <div class="blob teal"></div>
  </div>
  <canvas id="aurora-canvas" aria-hidden="true"></canvas>
  <div class="grain" aria-hidden="true"></div>

  {% include header.html %}

  <main class="main-content">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/aurora.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/interactions.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/transitions.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/tag-filter.js' | relative_url }}" defer></script>
</body>
</html>
